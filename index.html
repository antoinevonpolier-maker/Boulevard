<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Les Boulevards des Maréchaux — Carte interactive</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Archivo:wght@400;500;600&display=swap" rel="stylesheet">
<style>
 *{box-sizing:border-box}
 html,body{margin:0;padding:0;height:100%;
  --gold:#c2a15a;--gold-bright:#e7cd8c;--gold-soft:#9c7f43;
  --night:#131c30;--night-2:#1b2942;--cream:#f3ede1;--bord:#7a2230;
  font-family:Archivo,sans-serif;color:var(--cream)}
 ::selection{background:rgba(194,161,90,.3)}
 #app{height:100vh;display:flex;flex-direction:column;overflow:hidden;
  background:radial-gradient(130% 100% at 30% 0%, #1e2a44 0%, var(--night) 55%, #0c1322 100%)}
 header{flex:0 0 auto;display:flex;align-items:flex-end;justify-content:space-between;
  padding:22px 40px 16px;border-bottom:1px solid rgba(194,161,90,.22);gap:24px;flex-wrap:wrap}
 .eyebrow{font-size:12px;font-weight:500;letter-spacing:.26em;text-transform:uppercase;color:var(--gold)}
 h1{margin:4px 0 2px;font-family:Cinzel,serif;font-weight:600;font-size:34px;line-height:1;color:var(--cream)}
 .sub{font-family:'EB Garamond',serif;font-style:italic;font-size:18px;color:var(--gold-bright)}
 .progress{font-family:Cinzel,serif;font-size:15px;color:var(--gold);border:1px solid rgba(194,161,90,.5);
   border-radius:999px;padding:9px 20px;background:rgba(0,0,0,.2)}
 .progress b{color:var(--gold-bright)}
 .stage{flex:1 1 auto;display:flex;min-height:0;overflow:hidden}
 .mapwrap{flex:1 1 auto;display:flex;align-items:center;justify-content:center;padding:16px;min-width:0;min-height:0;position:relative;overflow:hidden}
 .mapinner{position:relative;display:inline-block;max-width:100%;max-height:100%;line-height:0}
 .mapinner img{display:block;max-width:100%;max-height:100%;width:auto;height:auto;border-radius:6px;
   box-shadow:0 10px 40px rgba(0,0,0,.5)}
 svg.overlay{position:absolute;top:0;left:0;width:100%;height:100%;display:block}
 .bd{fill:none;stroke:#c2a15a;stroke-width:9;stroke-linecap:round;stroke-linejoin:round;
  cursor:pointer;transition:stroke .2s,stroke-width .2s,opacity .2s;opacity:.92}
 .bd:hover{stroke:#e7cd8c;stroke-width:13;opacity:1}
 .bd.sel{stroke:#e7283f;stroke-width:16;opacity:1;filter:drop-shadow(0 0 10px rgba(231,40,63,.9));animation:pulseLine 1.4s ease-in-out infinite}
 .bd.faded{opacity:.32}
 @keyframes pulseLine{0%,100%{stroke-width:14}50%{stroke-width:20}}
 .pin{cursor:pointer;transition:.2s}
 .pin circle{fill:#c2a15a;stroke:#131c30;stroke-width:2.5;transition:.2s}
 .pin text{fill:#131c30;font-family:Cinzel,serif;font-size:15px;font-weight:700;text-anchor:middle;dominant-baseline:central;pointer-events:none;transition:.2s}
 .pin.sel circle{fill:#e7283f;stroke:#fff;stroke-width:3;r:22;filter:drop-shadow(0 0 8px rgba(231,40,63,.8));animation:pulsePin 1.4s ease-in-out infinite}
 .pin.sel text{fill:#fff;font-size:19px}
 @keyframes pulsePin{0%,100%{r:20}50%{r:24}}
 .pin.faded{opacity:.45}
 .rue{fill:none;stroke:#a8424f;stroke-width:8;stroke-linecap:round;stroke-linejoin:round;
  cursor:pointer;transition:.2s;opacity:.9}
 .rue:hover{stroke:#c45462;stroke-width:11;opacity:1}
 .rue.sel{stroke:#e7283f;stroke-width:13;opacity:1;filter:drop-shadow(0 0 8px rgba(231,40,63,.85))}
 .pinrue circle{fill:#a8424f;stroke:#f3ede1;stroke-width:2}
 .pinrue text{fill:#f3ede1;font-family:Cinzel,serif;font-size:12px;font-weight:700;text-anchor:middle;dominant-baseline:central;pointer-events:none}
 .pinrue{cursor:pointer}
 .pinrue.sel circle{fill:#e7283f}
 #panel{flex:0 0 380px;max-width:42vw;background:linear-gradient(180deg,var(--night-2),var(--night));
  border-left:1px solid rgba(194,161,90,.22);padding:28px 28px 36px;overflow-y:auto}
 #panel::-webkit-scrollbar{width:9px} #panel::-webkit-scrollbar-thumb{background:rgba(194,161,90,.35);border-radius:5px}
 .p-eyebrow{font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--gold);margin-bottom:10px}
 .badge{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-family:Cinzel,serif;font-weight:600;font-size:18px;background:var(--gold);color:var(--night);margin-bottom:16px}
 .badge.ghost{background:rgba(122,34,48,.25);color:#d98a93}
 .p-name{font-family:Cinzel,serif;font-size:25px;color:var(--cream);line-height:1.1;margin:0 0 4px}
 .p-title{font-family:'EB Garamond',serif;font-style:italic;font-size:18px;color:var(--gold-bright)}
 .p-dates{font-size:13px;color:#9aa3b5;letter-spacing:.04em;margin-bottom:18px}
 .p-line{height:1px;background:rgba(194,161,90,.22);margin:18px 0}
 .p-ctx,.p-reason{font-family:'EB Garamond',serif;font-size:18px;line-height:1.55;color:var(--cream)}
 .p-lab{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--gold-soft);margin:20px 0 9px}
 .chip{display:inline-block;border:1px solid rgba(194,161,90,.4);border-radius:999px;
  padding:5px 13px;margin:0 7px 7px 0;font-size:13px;color:var(--gold-bright)}
 .fate{display:inline-flex;align-items:center;gap:9px;font-family:'EB Garamond',serif;font-style:italic;font-size:16px}
 .fate b{width:9px;height:9px;border-radius:50%;display:inline-block}
 .placeholder{color:#9aa3b5;font-family:'EB Garamond',serif;font-style:italic;font-size:18px;line-height:1.5;margin-top:8px}
 @media(max-width:820px){
  html,body{height:auto;overflow:auto}
  #app{height:auto;min-height:100vh;overflow:visible}
  .stage{flex-direction:column;min-height:0;overflow:visible}
  #panel{flex:0 0 auto;max-width:none;border-left:none;border-top:1px solid rgba(194,161,90,.22);overflow:visible}
  h1{font-size:24px}header{padding:14px 18px 10px}
 }
</style>
</head>

const SVGNS='http://www.w3.org/2000/svg';

function buildMap(){
 PRESENT.forEach(m=>{
  if(!SEG[m.id]) return;
  const path=document.createElementNS(SVGNS,'path');
  path.setAttribute('d',SEG[m.id]); path.setAttribute('class','bd'); path.dataset.id=m.id;
  const ttl=document.createElementNS(SVGNS,'title'); ttl.textContent=m.n+' · Boulevard '+m.sur;
  path.appendChild(ttl);
  path.addEventListener('click',()=>select(m.id));
  layerBd.appendChild(path);
 });

  if(!MID[m.id]) return;
  const mid=MID[m.id];
  const g=document.createElementNS(SVGNS,'g'); g.setAttribute('class','pin'); g.dataset.id=m.id;

  const ttl=document.createElementNS(SVGNS,'title'); ttl.textContent='Boulevard '+m.sur;
  g.appendChild(c); g.appendChild(t); g.appendChild(ttl);
  g.addEventListener('click',()=>select(m.id));

 });

function refresh(){
 const any=selectedId!==null;
 document.querySelectorAll('.bd').forEach(p=>{
  const on=p.dataset.id===selectedId;
  p.classList.toggle('sel',on);
  p.classList.toggle('faded',any&&!on);
 });
 document.querySelectorAll('.pin').forEach(p=>{
  const on=p.dataset.id===selectedId;
  p.classList.toggle('sel',on);
  p.classList.toggle('faded',any&&!on);
 });
 document.querySelectorAll('.rue').forEach(p=>p.classList.toggle('sel',p.dataset.id===selectedId));
 document.querySelectorAll('.pinrue').forEach(p=>p.classList.toggle('sel',p.dataset.id===selectedId));
}
function select(id){ selectedId=id; refresh(); renderPanel(); }
function renderPanel(){
 const el=document.getElementById('panel');
 if(!selectedId){
  el.innerHTML='<div class="p-eyebrow">La couronne des dix-neuf</div>'
   +'<div class="p-name" style="font-size:22px">Une ceinture, dix-neuf maréchaux</div>'
   +'<div class="p-line"></div>'
   +'<div class="placeholder">Cliquez un tracé doré ou une pastille numérotée pour découvrir le maréchal dont le boulevard porte le nom.</div>';
  return;
 }
 const p=PRESENT.find(x=>x.id===selectedId);
 if(p){
  el.innerHTML='<div class="badge">'+p.n+'</div>'
   +'<div class="p-eyebrow">Boulevard '+p.sur+' · '+p.arr+' arrondissement</div>'
   +'<div class="p-name">'+p.full+'</div>'
   +'<div class="p-title">'+p.title+'</div>'
   +'<div class="p-dates">'+p.dates+'  ·  '+p.mar+'</div>'
   +'<div class="p-ctx">'+p.ctx+'</div>'
   +'<div class="p-lab">Faits d\'armes</div>'+p.bat.map(b=>'<span class="chip">'+b+'</span>').join('')
   +'<div class="p-line"></div>'
   +'<div class="fate"><b style="background:'+fateColor(p.fk)+'"></b>'+p.fate+'</div>';
  return;
 }
 const a=ABSENT.find(x=>x.id===selectedId);
 if(a){
  el.innerHTML='<div class="badge ghost">R</div>'
   +'<div class="p-eyebrow">'+(a.rue||('Rue '+a.sur))+(a.arr?' · '+a.arr+' arrondissement':'')+'</div>'
   +'<div class="p-name">'+a.full+'</div>'
   +'<div class="p-title">'+a.title+'</div>'
   +'<div class="p-dates">'+a.dates+(a.depuis?'  ·  voie créée : '+a.depuis:'')+'</div>'
   +(a.desc?'<div class="p-ctx">'+a.desc+'</div>':'')
   +'<div class="p-line"></div>'
   +'<div class="p-lab">Pas de boulevard</div>'
   +'<div class="p-reason">'+a.reason+'</div>';
 }
}
buildMap(); renderPanel();
// Garantir que le calque SVG colle exactement à l'image affichée
function syncOverlay(){
 const img=document.getElementById('mapimg');
 const svg=document.getElementById('svg');
 const wrap=document.querySelector('.mapwrap');
 if(!img||!svg||!wrap) return;
 // Contraindre l'image à la zone dispo (uniquement en mode desktop figé)
 const desktop=window.innerWidth>820;
 if(desktop){
   const availW=wrap.clientWidth-32, availH=wrap.clientHeight-32;
   const ratio=1488/1057;
   let w=availW, h=w/ratio;
   if(h>availH){ h=availH; w=h*ratio; }
   img.style.width=w+'px'; img.style.height=h+'px';
 } else {
   img.style.width=''; img.style.height='';
 }
 const w=img.clientWidth, h=img.clientHeight;
 if(w&&h){ svg.style.width=w+'px'; svg.style.height=h+'px'; }
}
const _img=document.getElementById('mapimg');
if(_img){ if(_img.complete) syncOverlay(); else _img.addEventListener('load',syncOverlay); }
window.addEventListener('resize',syncOverlay);
setTimeout(syncOverlay,100);
setTimeout(syncOverlay,400);
// Clic sur le fond (rect transparent) -> désélectionne
